<!-- app.component.html -->
<div class="app-container">
    <!-- Header -->
    <header class="app-header">
        <div class="logo">
            <h1>🔍 {{ title }}</h1>
            <p>Module de Reconnaissance et Gestion d'Entités</p>
        </div>
    </header>

    <!-- Sub-tabs -->
    <nav class="sub-tabs">
        <button class="sub-tab-btn" [class.active]="activeOcrTab() === 'analyse'" (click)="setOcrTab('analyse')">
            <span class="sub-tab-icon">🔍</span>
            Analyse OCR
        </button>
        <button class="sub-tab-btn" [class.active]="activeOcrTab() === 'entity'" (click)="setOcrTab('entity')">
            <span class="sub-tab-icon">⚙️</span>
            Gestion des Entités
        </button>
        <button class="sub-tab-btn" [class.active]="activeOcrTab() === 'composite'" (click)="setOcrTab('composite')">
            <span class="sub-tab-icon">🧩</span>
            Entités Composites
        </button>
        <button class="sub-tab-btn" [class.active]="activeOcrTab() === 'matching'" (click)="setOcrTab('matching')">
            <span class="sub-tab-icon">🔗</span>
            Appariement (Recto/Verso)
        </button>
    </nav>

    <main class="content">
        @if (activeOcrTab() === 'analyse') {
            <app-ocr-upload />
        } @else if (activeOcrTab() === 'entity') {
            <app-entity-creator />
        } @else if (activeOcrTab() === 'composite') {
            <app-composite-creator />
        } @else if (activeOcrTab() === 'matching') {
            <app-matching />
        }
    </main>

    <!-- Footer -->
    <footer class="app-footer">
        <p>Powered by Flask + Angular 18 | Backend OCR: <a href="http://localhost:8082" target="_blank" rel="noopener">localhost:8082</a>
        </p>
    </footer>
</div>
